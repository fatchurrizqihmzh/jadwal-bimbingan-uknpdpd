  return 'Assalamualaikum Wr. Wb. Selamat malam dokter '+drnm(p)+'. Mohon maaf mengganggu waktunya dokter\uD83D\uDE4F\n\nPerkenalkan saya ... perwakilan mahasiswa First Taker UKMPPD yang akan melakukan bimbingan bersama panjenengan.\n\nPermisi dokter, saya izin untuk mengkonfirmasi. Pada hari '+hari+', '+tgl+', kami terdapat jadwal bimbingan UKMPPD dengan panjenengan untuk materi '+mat+'. Sekiranya panjenengan berkenan untuk dilaksanakan pada pukul berapa nggih dokter? Mohon arahan dan bimbingannya dokter\uD83D\uDE4F\n\nTerima kasih dokter,\nWassalamualaikum Wr. Wb.\uD83D\uDE4F';
}
function wHref(p,mat,tgl,hari){const n=gwa(p);const f=wfmt(n);if(!f)return '';return 'https://wa.me/'+f+'?text='+encodeURIComponent(bTpl(p,mat,tgl,hari));}
let _tp='';
function opMo(p,mat,tgl,hari){
  _tp=bTpl(p,mat,tgl,hari);const hr=wHref(p,mat,tgl,hari);
  document.getElementById('mo-title').textContent='Template WA \u2014 dr. '+drnm(p);
  document.getElementById('mo-body').textContent=_tp;
  const wa=document.getElementById('mo-wa');
  if(hr){wa.href=hr;wa.style.opacity='1';wa.style.pointerEvents='auto';}
  else{wa.href='#';wa.style.opacity='.4';wa.style.pointerEvents='none';}
  document.getElementById('modal').style.display='flex';document.body.style.overflow='hidden';
}
function closeMo(){document.getElementById('modal').style.display='none';document.body.style.overflow='';}
function cpTpl(){navigator.clipboard.writeText(_tp).then(()=>{const b=document.querySelector('#modal .bd2');const o=b.textContent;b.textContent='\u2705 Tersalin!';setTimeout(()=>b.textContent=o,1800);})}
function waCell(p,mat,tgl,hari,uid){
  const n=gwa(p);const f=wfmt(n);const hr=f?wHref(p,mat,tgl,hari):'';
  const sid=uid.replace(/[^a-z0-9]/gi,'_');
  if(WE.has(p)){
    return '<div class="wei" id="ww-'+sid+'"><input class="wi" id="wi-'+sid+'" placeholder="Ketik nomor WA..." value="'+n+'" oninput="wiCh(\''+p.replace(/'/g,"\\'")+'\',' +
      '\''+sid+'\',\''+mat.replace(/'/g,"\\'")+'\',\''+tgl+'\',\''+hari+'\')">'+(f?'<a class="wl" href="'+hr+'" target="_blank" id="wb-'+sid+'">💬 WA</a>':'<a class="wl" href="#" style="opacity:.4;pointer-events:none" id="wb-'+sid+'">💬 WA</a>')+'</div>';
  }
  return f?'<a class="wl" href="'+hr+'" target="_blank">💬 '+n+'</a>':'<span style="color:var(--fa);font-size:10.5px">\u2014</span>';
}
function wiCh(p,sid,mat,tgl,hari){
  const inp=document.getElementById('wi-'+sid);const v=inp?inp.value.trim():'';swa(p,v);
  const f=wfmt(v);const btn=document.getElementById('wb-'+sid);
  if(btn){if(f){btn.href=wHref(p,mat,tgl,hari);btn.style.opacity='1';btn.style.pointerEvents='auto';}else{btn.href='#';btn.style.opacity='.4';btn.style.pointerEvents='none';}}
}
function bStats(){
  const t=Object.keys(PJ).length;
  document.getElementById('stats').innerHTML='<div class="sc"><div class="sl">Soal Selesai</div><div class="sv" id="sv-s">0/'+t+'</div><div class="ss">semua sesi</div></div><div class="sc"><div class="sl">Pengajar Dihubungi</div><div class="sv" id="sv-h">0/'+t+'</div><div class="ss">semua sesi</div></div><div class="sc"><div class="sl">Total Mahasiswa</div><div class="sv">19</div><div class="ss">17 + 2 pending</div></div><div class="sc"><div class="sl">Total Periode</div><div class="sv">4</div><div class="ss">minggu bimbingan</div></div>';
}
function bJadwal(){
  let tbl='',cds='',cm=0;
  DATA.forEach((r,i)=>{
    if(r.m!==cm){
      if(cm>0){tbl+='</tbody></table></div></div>';cds+='</div></div>';}
      cm=r.m;
      tbl+='<div class="ws"><div class="wh"><div class="wd"></div>'+ML[cm]+'</div><div class="ts jts"><table><thead><tr><th style="width:86px">Tanggal</th><th style="width:50px">Hari</th><th>Materi Pagi (07.00\u201310.00)</th><th style="width:175px">Pengajar Pagi</th><th style="width:64px;text-align:center">\u270F\uFE0F Soal</th><th style="width:148px">PJ Soal &amp; Hubungi</th><th>Materi Siang (12.00\u201315.00)</th><th style="width:175px">Pengajar Siang</th><th style="width:64px;text-align:center">\u270F\uFE0F Soal</th><th style="width:148px">PJ Soal &amp; Hubungi</th></tr></thead><tbody>';
      cds+='<div class="ws"><div class="wh"><div class="wd"></div>'+ML[cm]+'</div><div class="cl">';
    }
    const isTO=r.tp==='to',isLB=r.tp==='lb',isSLB=r.ts==='lb'||r.siang==='—';
    const rc=isLB?'rlb':isTO?'rto':'';
    const tgP=isTO?'<span class="tg tt">TRY OUT</span>':isLB?'<span class="tg tl">LIBUR</span>':'<span class="tg tp">PAGI</span>';
    const tgS=isSLB?'':'<span class="tg ts2">SIANG</span>';
    const kP=r.tgl+'_PAGI',kS=r.tgl+'_SIANG';
    const pjP=PJ[kP]||'',pjS=PJ[kS]||'';
    const cbP=(!isTO&&!isLB&&r.pp!=='—'&&pjP)?'<div class="cw"><div class="cb'+(lg('soal_'+kP)==='1'?' on':'')+'" onclick="tog(\'soal_'+kP+'\',this)"></div></div>':'<div style="text-align:center;color:var(--fa);font-size:10px">\u2014</div>';
    const cbS=(!isSLB&&r.sp!=='—'&&pjS)?'<div class="cw"><div class="cb gn'+(lg('soal_'+kS)==='1'?' on':'')+'" onclick="tog(\'soal_'+kS+'\',this)"></div></div>':'<div style="text-align:center;color:var(--fa);font-size:10px">\u2014</div>';
    const pjPh=pjP?'<div class="pjs" title="'+pjP+'">👤 '+pjP+'</div>':'<span style="color:var(--fa);font-size:10px">\u2014</span>';
    const pjSh=pjS?'<div class="pjs" title="'+pjS+'">👤 '+pjS+'</div>':'<span style="color:var(--fa);font-size:10px">\u2014</span>';
    tbl+='<tr class="'+rc+'"><td class="dc">'+r.tgl+'</td><td class="hc">'+r.hari+'</td><td>'+tgP+' <span class="mt">'+r.pagi+'</span></td><td style="font-size:11px;font-weight:500">'+r.pp+'</td><td>'+cbP+'</td><td>'+pjPh+'</td><td>'+tgS+' <span class="mt">'+(r.siang||'\u2014')+'</span></td><td style="font-size:11px;font-weight:500">'+r.sp+'</td><td>'+cbS+'</td><td>'+pjSh+'</td></tr>';
    // Mobile cards
    if(!isLB){
      const cbPm=(!isTO&&r.pp!=='—'&&pjP)?'<div class="cb'+(lg('soal_'+kP)==='1'?' on':'')+'" onclick="tog(\'soal_'+kP+'\',this)" style="width:22px;height:22px;border:2px solid var(--bds);border-radius:5px;cursor:pointer;display:flex;align-items:center;justify-content:center;background:var(--sf);transition:all .15s"></div>':'<span style="color:var(--fa);font-size:10px">N/A</span>';
      cds+='<div class="cd"><div class="cdh"><div><span class="dc">'+r.tgl+'</span> <strong style="font-size:11.5px">'+r.hari+'</strong></div><span class="tg '+(isTO?'tt':'tp')+'">'+(isTO?'TRY OUT':'PAGI')+'</span></div><div class="cm2">'+r.pagi+'</div><div class="cp">'+r.pp+'</div><div class="cr"><span class="crl">\u270F\uFE0F Soal selesai?</span>'+cbPm+'</div>'+(pjP?'<div class="cr"><span class="crl">👤 PJ</span><span class="cpj">'+pjP+'</span></div>':'')+'</div>';
    }
    if(!isSLB){
      const cbSm=(!isSLB&&r.sp!=='—'&&pjS)?'<div class="cb gn'+(lg('soal_'+kS)==='1'?' on':'')+'" onclick="tog(\'soal_'+kS+'\',this)" style="width:22px;height:22px;border:2px solid var(--bds);border-radius:5px;cursor:pointer;display:flex;align-items:center;justify-content:center;background:var(--sf);transition:all .15s"></div>':'<span style="color:var(--fa);font-size:10px">N/A</span>';
      cds+='<div class="cd"><div class="cdh"><div><span class="dc">'+r.tgl+'</span> <strong style="font-size:11.5px">'+r.hari+'</strong></div><span class="tg ts2">SIANG</span></div><div class="cm2">'+r.siang+'</div><div class="cp">'+r.sp+'</div><div class="cr"><span class="crl">\u270F\uFE0F Soal selesai?</span>'+cbSm+'</div>'+(pjS?'<div class="cr"><span class="crl">👤 PJ</span><span class="cpj">'+pjS+'</span></div>':'')+'</div>';
    }
  });
  tbl+='</tbody></table></div></div>';cds+='</div></div>';
  document.getElementById('jc').innerHTML='<div>'+tbl+'</div><div>'+cds+'</div>';
}
function bKontak(){
  const rows=[];
  DATA.forEach((r,i)=>{
    if(r.pp!=='—')rows.push({...r,i,ses:'PAGI',pgr:r.pp,mat:r.pagi});
    if(r.sp!=='—'&&r.siang!=='—')rows.push({...r,i,ses:'SIANG',pgr:r.sp,mat:r.siang});
  });
  let h='<div class="ts"><table><thead><tr><th style="width:86px">Tanggal</th><th style="width:50px">Hari</th><th style="width:55px">Sesi</th><th>Pengajar</th><th style="width:158px">No. WhatsApp</th><th style="width:74px;text-align:center">\u2705 Dihubungi</th><th style="width:74px;text-align:center">💬 Template</th><th style="width:168px">PJ Soal &amp; Penghubung<br><span style="font-weight:400;font-size:9px;text-transform:none;letter-spacing:0;color:var(--mu)">(sama dgn PJ pembuatan soal)</span></th></tr></thead><tbody>';
  let cm=0;
  rows.forEach(r=>{
    if(r.m!==cm){cm=r.m;h+='<tr class="sd"><td colspan="8">'+ML[cm].replace(/&nbsp;/g,' ')+'</td></tr>';}
    const isp=r.ses==='PAGI';const tg=isp?'<span class="tg tp">PAGI</span>':'<span class="tg ts2">SIANG</span>';
    const pk=r.tgl+'_'+r.ses;const pjNm=PJ[pk]||'—';const hk='hub_'+pk;
    const cb='<div class="cw"><div class="cb'+(isp?'':' gn')+(lg(hk)==='1'?' on':'')+'" onclick="tog(\''+hk+'\',this)"></div></div>';
    const uid=(r.tgl+'_'+r.ses).replace(/-/g,'');
    const pE=r.pgr.replace(/\\/g,'\\\\').replace(/'/g,"\\'");const mE=r.mat.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    const tBtn='<div class="cw"><button class="btn bsm" onclick="opMo(\''+pE+'\',\''+mE+'\',\''+r.tgl+'\',\''+r.hari+'\')">📝 Lihat</button></div>';
    const pjH=pjNm!=='—'?'<div class="pjb"><div class="pjr"><span class="pjn">👤</span>'+pjNm+'</div></div>':'<span style="color:var(--fa);font-size:10px">\u2014</span>';
    h+='<tr><td class="dc">'+r.tgl+'</td><td class="hc">'+r.hari+'</td><td>'+tg+'</td><td style="font-size:11px;font-weight:500">'+r.pgr+'</td><td>'+waCell(r.pgr,r.mat,r.tgl,r.hari,uid)+'</td><td>'+cb+'</td><td>'+tBtn+'</td><td>'+pjH+'</td></tr>';
  });
  h+='</tbody></table></div>';
  document.getElementById('kc').innerHTML=h;
}
function swTab(tab,btn){
  document.querySelectorAll('.pn').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.tb').forEach(b=>b.classList.remove('on'));
  document.getElementById('pn-'+tab).classList.add('on');btn.classList.add('on');
  const bc=document.getElementById('btn-ct');if(bc)bc.style.display=(tab==='jadwal'&&window.innerWidth>=768)?'inline-flex':'none';
}
bStats();bJadwal();bKontak();upPr();
if(window.innerWidth>=768)document.getElementById('btn-ct').style.display='inline-flex';
</script>
